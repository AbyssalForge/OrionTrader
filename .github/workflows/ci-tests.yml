name: CI - Tests Automatisés (Simplifié)

on:
  push:
    branches: [ main, dev, bloc_e3_ia ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============================================================================
  # JOB 1: TESTS ET COUVERTURE (C12)
  # ============================================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']  # Une seule version pour simplifier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r airflow/requirements.txt || echo "No airflow requirements"
          pip install -r fastapi/requirements.txt || echo "No fastapi requirements"
          pip install -e . || echo "No package setup"

      - name: Run tests with coverage
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}"
          pytest tests/ \
            --cov=airflow \
            --cov=fastapi \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  # ============================================================================
  # JOB 2: DOCKER BUILD (C13)
  # ============================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test  # Exécute seulement si tests OK

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test docker-compose config
        run: |
          docker-compose config

      - name: Build Docker images
        run: |
          docker-compose build --parallel || docker-compose build
        timeout-minutes: 20

      - name: List built images
        run: |
          docker images
