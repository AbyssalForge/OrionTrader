name: CI - Tests Automatisés

on:
  push:
    branches: [ main, develop, bloc_e3_ia ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============================================================================
  # JOB 1: TESTS UNITAIRES ET COUVERTURE
  # ============================================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r airflow/requirements.txt
          pip install -r fastapi/requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            --cov=airflow \
            --cov=fastapi \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            junit.xml
            htmlcov/

  # ============================================================================
  # JOB 2: LINTING ET CODE QUALITY
  # ============================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install black isort flake8 mypy pylint

      - name: Run Black (formatter check)
        run: |
          black --check --diff airflow/ fastapi/ tests/

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff airflow/ fastapi/ tests/

      - name: Run Flake8 (linting)
        run: |
          flake8 airflow/ fastapi/ tests/ --max-line-length=120 --ignore=E203,W503

      - name: Run Pylint (advanced linting)
        continue-on-error: true
        run: |
          pylint airflow/services/ airflow/clients/ fastapi/app/ --max-line-length=120

  # ============================================================================
  # JOB 3: SECURITY SCAN
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # JOB 4: DOCKER BUILD TEST
  # ============================================================================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Airflow image
        run: |
          docker build -t oriontrader-airflow:test ./airflow

      - name: Build FastAPI image
        run: |
          docker build -t oriontrader-fastapi:test ./fastapi

      - name: Build MLflow image
        run: |
          docker build -t oriontrader-mlflow:test ./mlflow

      - name: Test docker-compose config
        run: |
          docker-compose config

  # ============================================================================
  # JOB 5: INTEGRATION TESTS
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r airflow/requirements.txt
          pip install -r fastapi/requirements.txt

      - name: Run integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        run: |
          pytest tests/ -m integration -v
