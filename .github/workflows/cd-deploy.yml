name: CD - Déploiement Continu

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/oriontrader

jobs:
  # ============================================================================
  # JOB 1: BUILD & PUSH DOCKER IMAGES
  # ============================================================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [airflow, fastapi, mlflow, marimo, streamlit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # JOB 2: DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.oriontrader.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/oriontrader
            git pull origin main
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker-compose ps
          EOF

      - name: Health check
        run: |
          sleep 30
          curl -f https://staging.oriontrader.example.com/health || exit 1

  # ============================================================================
  # JOB 3: RUN SMOKE TESTS ON STAGING
  # ============================================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest requests

      - name: Run smoke tests
        env:
          API_URL: https://staging.oriontrader.example.com
        run: |
          pytest tests/ -m "not slow" --maxfail=5 -v

  # ============================================================================
  # JOB 4: DEPLOY TO PRODUCTION (MANUAL APPROVAL)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://oriontrader.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/oriontrader
            git pull origin main
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker-compose ps
          EOF

      - name: Health check
        run: |
          sleep 30
          curl -f https://oriontrader.example.com/health || exit 1

      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              environment_url: 'https://oriontrader.example.com',
              description: 'Deployment to production successful'
            })

  # ============================================================================
  # JOB 5: MLFLOW MODEL PROMOTION
  # ============================================================================
  promote-model:
    name: Promote ML Model
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install MLflow
        run: |
          pip install mlflow psycopg2-binary

      - name: Promote model to Production
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python - <<EOF
          import mlflow
          from mlflow.tracking import MlflowClient

          client = MlflowClient()

          # Get latest model version in Staging
          model_name = "classification_model"
          versions = client.search_model_versions(f"name='{model_name}'")

          staging_version = None
          for v in versions:
              if v.current_stage == "Staging":
                  staging_version = v
                  break

          if staging_version:
              # Promote to Production
              client.transition_model_version_stage(
                  name=model_name,
                  version=staging_version.version,
                  stage="Production",
                  archive_existing_versions=True
              )
              print(f"Model {model_name} v{staging_version.version} promoted to Production")
          else:
              print("No model in Staging to promote")
          EOF

  # ============================================================================
  # JOB 6: ROLLBACK ON FAILURE
  # ============================================================================
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: failure()

    steps:
      - name: Rollback staging
        if: needs.deploy-staging.result == 'failure'
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/oriontrader
            git reset --hard HEAD~1
            docker-compose up -d --force-recreate
          EOF

      - name: Rollback production
        if: needs.deploy-production.result == 'failure'
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/oriontrader
            git reset --hard HEAD~1
            docker-compose up -d --force-recreate
          EOF

      - name: Notify failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deployment Failed - Rollback Executed',
              body: 'Automated deployment failed and rollback was triggered. Please investigate.',
              labels: ['deployment', 'bug', 'urgent']
            })
