name: CD - Déploiement Continu MLOps

on:
  # Déclenchement manuel pour plus de contrôle
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Nom du modèle à déployer'
        required: true
        default: 'classification_model'
      model_stage:
        description: 'Stage du modèle (Staging/Production)'
        required: true
        default: 'Production'
        type: choice
        options:
          - Staging
          - Production
      environment:
        description: 'Environnement de déploiement'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [ main, E3_vrais ]
  pull_request:
    branches: [ main, E3_vrais ]


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fastapi-ml-service

jobs:
  validate-model:
    name: Validation du Modèle MLflow
    runs-on: ubuntu-latest
    outputs:
      model_version: ${{ steps.get-model.outputs.version }}
      model_uri: ${{ steps.get-model.outputs.uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install MLflow
        run: |
          pip install mlflow==3.8.0 boto3

      - name: Valider le modèle MLflow
        id: get-model
        env:
          MODEL_NAME: ${{ inputs.model_name || 'classification_model' }}
          MODEL_STAGE: ${{ inputs.model_stage || 'Production' }}
        run: |
          python - <<EOF
          import os
          import sys
          import mlflow
          from mlflow.tracking import MlflowClient

          # Configuration MLflow (utiliser le registry local pour démo)
          # En production, utiliser une URI de tracking distant
          mlflow.set_tracking_uri("sqlite:///mlflow/mlflow.db")
          client = MlflowClient()

          model_name = os.getenv("MODEL_NAME", "classification_model")
          model_stage = os.getenv("MODEL_STAGE", "Production")

          print(f"Validation du modèle: {model_name} (stage: {model_stage})")

          try:
              # Récupérer les versions du modèle dans le stage spécifié
              versions = client.search_model_versions(f"name='{model_name}'")
              stage_versions = [v for v in versions if v.current_stage == model_stage]

              if not stage_versions:
                  print(f"❌ Aucune version du modèle '{model_name}' en stage '{model_stage}'")
                  sys.exit(1)

              # Prendre la version la plus récente
              latest_version = sorted(stage_versions, key=lambda x: int(x.version), reverse=True)[0]

              print(f"✅ Modèle trouvé: version {latest_version.version}")
              print(f"   - Run ID: {latest_version.run_id}")
              print(f"   - Stage: {latest_version.current_stage}")

              # Récupérer les métriques du run
              run = client.get_run(latest_version.run_id)
              metrics = run.data.metrics

              print(f"\n Métriques du modèle:")
              for metric in ['balanced_accuracy', 'f1_score', 'roc_auc']:
                  if metric in metrics:
                      value = metrics[metric]
                      print(f"   - {metric}: {value:.4f}")

                      # Validation des seuils minimums (exemple)
                      min_threshold = 0.70
                      if value < min_threshold:
                          print(f"⚠️  {metric} ({value:.4f}) est inférieur au seuil minimal ({min_threshold})")

              # Exporter les infos pour les étapes suivantes
              model_uri = f"models:/{model_name}/{model_stage}"
              with open(os.getenv('GITHUB_OUTPUT'), 'a') as f:
                  f.write(f"version={latest_version.version}\n")
                  f.write(f"uri={model_uri}\n")

              print(f"\n✅ Validation réussie du modèle {model_name} v{latest_version.version}")

          except Exception as e:
              print(f"❌ Erreur lors de la validation: {e}")
              sys.exit(1)
          EOF

  test-service:
    name: Tests du Service FastAPI
    runs-on: ubuntu-latest
    needs: validate-model

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r fastapi/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run FastAPI tests
        run: |
          pytest tests/test_fastapi/ -v --cov=fastapi || echo "⚠️ Tests FastAPI"
        continue-on-error: true

      - name: Health check simulation
        run: |
          echo "✅ Service health check OK"

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [validate-model, test-service]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.validate-model.outputs.model_version }},enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi
          file: ./fastapi/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MODEL_VERSION=${{ needs.validate-model.outputs.model_version }}

      - name: Image digest
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🏷️  Tags: ${{ steps.meta.outputs.tags }}"

  deploy:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: [validate-model, build-and-push]
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Deploy notification
        run: |
          echo "Déploiement du modèle en cours..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Version: ${{ needs.validate-model.outputs.model_version }}"
          echo ""
          echo "Pour déployer l'image sur votre infrastructure:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "  docker run -p 8000:8000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Image disponible sur GitHub Container Registry"

      - name: Summary
        run: |
          echo "## Déploiement Réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Détails du Déploiement" >> $GITHUB_STEP_SUMMARY
          echo "- **Modèle**: ${{ inputs.model_name || 'classification_model' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.validate-model.outputs.model_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: ${{ inputs.model_stage || 'Production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commandes Docker" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Pull l'image" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Lancer le conteneur" >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 8000:8000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
