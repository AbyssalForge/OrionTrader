[pytest]
# Configuration pytest pour OrionTrader

# Dossiers à scanner
testpaths = tests

# Pattern des fichiers de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut
# -v: Verbose
# --strict-markers: Erreur si marker inconnu
# --tb=short: Traceback court
# --cov: Coverage des dossiers airflow et fastapi
# --cov-report: Génération rapports (term, html, xml)
# --maxfail=5: Stop après 5 échecs
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=airflow
    --cov=fastapi
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --maxfail=5

# Markers personnalisés
markers =
    unit: Tests unitaires rapides
    integration: Tests d'intégration (plus lents)
    ml: Tests spécifiques au ML
    api: Tests des endpoints API
    slow: Tests lents (>5s)
    bronze: Tests couche Bronze
    silver: Tests couche Silver
    gold: Tests couche Gold

# Ignorer certains warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeouts (5 minutes max par test)
timeout = 300
