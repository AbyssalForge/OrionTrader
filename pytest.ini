[pytest]
# Configuration pytest pour OrionTrader

# Dossiers à scanner
testpaths = tests

# Pattern des fichiers de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut
addopts =
    -v                          # Verbose
    --strict-markers            # Erreur si marker inconnu
    --tb=short                  # Traceback court
    --cov=airflow              # Coverage du dossier airflow
    --cov=fastapi              # Coverage du dossier fastapi
    --cov-report=term-missing  # Afficher lignes manquantes
    --cov-report=html          # Générer rapport HTML
    --cov-report=xml           # Générer rapport XML (pour CI)
    --maxfail=5                # Stop après 5 échecs

# Markers personnalisés
markers =
    unit: Tests unitaires rapides
    integration: Tests d'intégration (plus lents)
    ml: Tests spécifiques au ML
    api: Tests des endpoints API
    slow: Tests lents (>5s)
    bronze: Tests couche Bronze
    silver: Tests couche Silver
    gold: Tests couche Gold

# Ignorer certains warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeouts
timeout = 300  # 5 minutes max par test
