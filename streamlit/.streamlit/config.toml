[server]
# Enable hot-reload on file changes
fileWatcherType = "poll"
headless = true
port = 8501
address = "0.0.0.0"

[browser]
# Disable automatic opening of browser
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
# Theme personnalisé
primaryColor = "#FF4B4B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"
