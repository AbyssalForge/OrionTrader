[server]
# Enable hot-reload on file changes
fileWatcherType = "poll"
headless = true
port = 8502
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false

[browser]
# Disable automatic opening of browser
gatherUsageStats = false

[theme]
# Theme personnalisé
primaryColor = "#FF4B4B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"
