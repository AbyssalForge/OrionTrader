version: "3.9"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
  AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW_HOME: /opt/airflow

services:
  postgres:
    image: postgres:15
    container_name: orion_postgres
    environment:
      # Superuser et base principale de trading
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trading_data}
      POSTGRES_HOST_AUTH_METHOD: md5
      # Airflow
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      # MLflow
      MLFLOW_DB_NAME: ${MLFLOW_DB_NAME}
      MLFLOW_DB_USER: ${MLFLOW_DB_USER}
      MLFLOW_DB_PASSWORD: ${MLFLOW_DB_PASSWORD}
      # FastAPI (auth)
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME:-fastapi}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER:-fastapi}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD:-fastapi}
      # Streamlit (read-only)
      STREAMLIT_DB_USER: ${STREAMLIT_DB_USER:-streamlit}
      STREAMLIT_DB_PASSWORD: ${STREAMLIT_DB_PASSWORD:-streamlit}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./docker-init/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: always
    ports:
      - "5432:5432"
    networks:
      - oriontrader_network

  postgres-init:
    image: postgres:15
    container_name: orion_postgres_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      MLFLOW_DB_NAME: ${MLFLOW_DB_NAME}
      MLFLOW_DB_USER: ${MLFLOW_DB_USER}
      MLFLOW_DB_PASSWORD: ${MLFLOW_DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME:-fastapi}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER:-fastapi}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD:-fastapi}
      STREAMLIT_DB_USER: ${STREAMLIT_DB_USER:-streamlit}
      STREAMLIT_DB_PASSWORD: ${STREAMLIT_DB_PASSWORD:-streamlit}
    volumes:
      - ./docker-init/init-postgres.sh:/init-postgres.sh
    command: bash /init-postgres.sh
    networks:
      - oriontrader_network
    restart: "no"
    labels:
      - "com.docker.compose.oneoff=True"

  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: orion_mlflow
    working_dir: /mlflow
    environment:
      MLFLOW_HOST: "*"
    volumes:
      - ./mlflow/mlruns:/mlflow/mlruns
    command:
      - mlflow
      - server
      - --backend-store-uri
      - postgresql://${MLFLOW_DB_USER}:${MLFLOW_DB_PASSWORD}@postgres:5432/${MLFLOW_DB_NAME}
      - --default-artifact-root
      - file:///mlflow/mlruns
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - "*"
    ports:
      - "5000:5000"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - oriontrader_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  airflow:
    build: ./airflow
    container_name: orion_airflow
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      vault:
        condition: service_started
    environment:
      <<: *airflow-env
      PYTHONPATH: /opt/airflow:/opt/airflow/dags:/opt/airflow/utils:/opt/airflow/services:/opt/airflow/clients:/opt/airflow/config
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-orion-root-token}
      MT5_HOST: ${MT5_HOST:-host.docker.internal}
      MT5_PORT: ${MT5_PORT:-9090}
    volumes:
      - ./airflow:/opt/airflow
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    networks:
      - oriontrader_network
    restart: always
    command: >
      bash -c "
        echo 'Waiting for database...' &&
        sleep 15 &&
        echo 'Migrating Airflow database...' &&
        airflow db migrate &&
        echo 'Creating admin user...' &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin 2>/dev/null || echo 'Admin user already exists' &&
        echo 'Starting Airflow standalone...' &&
        airflow standalone
      "

  fastapi:
    build: ./fastapi
    container_name: orion_fastapi
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Mode (development ou production)
      ENVIRONMENT: ${FASTAPI_ENVIRONMENT:-development}
      # Optional: MLFlow et Vault
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-orion-root-token}
      # FastAPI Auth Database
      FASTAPI_DB_HOST: ${POSTGRES_URL:-postgres}
      FASTAPI_DB_PORT: ${POSTGRES_PORT:-5432}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME:-fastapi}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER:-fastapi}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD:-fastapi}
      # Master API Token (from .env)
      FASTAPI_MASTER_TOKEN: ${FASTAPI_MASTER_TOKEN}
    volumes:
      - ./fastapi:/app:rw  # Mount code pour hot-reload en dev
      - ./airflow:/opt/airflow:ro  # Access aux models
      - ./mlflow/mlruns:/mlflow/mlruns:rw  # Access aux artifacts MLflow
    ports:
      - "8000:8000"
    networks:
      - oriontrader_network
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: orion_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    ports:
      - "9090:9090"
    networks:
      - oriontrader_network
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: orion_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    networks:
      - oriontrader_network
    depends_on:
      - prometheus
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  pushgateway:
    image: prom/pushgateway:latest
    container_name: orion_pushgateway
    ports:
      - "9091:9091"
    networks:
      - oriontrader_network
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orion_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    networks:
      - oriontrader_network
    depends_on:
      - postgres
    restart: always
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  vault:
    image: hashicorp/vault:latest
    container_name: orion_vault
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
      VAULT_UNSEAL_KEY: ${VAULT_UNSEAL_KEY}
    ports:
      - "8200:8200"
    networks:
      - oriontrader_network
    restart: always
    volumes:
      - ./vault/policies:/vault/policies
      - ./vault/data:/vault/data
      - ./vault/config:/vault/config
      - ./docker-init/vault-auto-unseal.sh:/vault/auto-unseal.sh:ro
      - ./docker-init/vault-entrypoint.sh:/vault/entrypoint.sh:ro
    cap_add:
      - IPC_LOCK
    entrypoint: ["/bin/sh", "/vault/entrypoint.sh"]

  marimo:
    build: ./marimo
    container_name: orion_marimo
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-orion-root-token}
    volumes:
      - ./marimo/notebooks:/app/notebooks:rw  # Hot-reload notebooks
      - ./mlflow/mlruns:/mlflow/mlruns:rw  # Partage artifacts MLflow
    ports:
      - "2718:2718"
    networks:
      - oriontrader_network
    restart: unless-stopped

  streamlit:
    build: ./streamlit
    container_name: orion_streamlit
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database connection (read-only user)
      POSTGRES_HOST: ${POSTGRES_URL:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-trading_data}
      POSTGRES_USER: ${STREAMLIT_DB_USER:-streamlit}
      POSTGRES_PASSWORD: ${STREAMLIT_DB_PASSWORD:-streamlit}
      # Vault
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:-orion-root-token}
      # FastAPI endpoint
      FASTAPI_URL: http://fastapi:8000
      # FastAPI Authentication Token
      FASTAPI_API_TOKEN: ${FASTAPI_MASTER_TOKEN}
    volumes:
      - ./streamlit:/app:rw  # Hot-reload sur modification code
      - ./airflow/models:/opt/airflow/models:ro  # Accès aux models SQLAlchemy
    ports:
      - "8501:8501"
    networks:
      - oriontrader_network
    restart: always
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501 --server.fileWatcherType=poll

networks:
  oriontrader_network:
    driver: bridge

volumes:
  postgres-db-volume:
  grafana-data:
  pgadmin-data:
  airflow-logs:
  vault-data:
