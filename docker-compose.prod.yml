version: "3.9"

# docker-compose pour déploiement OVH VPS
# Services: postgres, mlflow, fastapi, streamlit + nginx (SSL)

services:
  postgres:
    image: postgres:15
    container_name: orion_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trading_data}
      POSTGRES_HOST_AUTH_METHOD: md5
      MLFLOW_DB_NAME: ${MLFLOW_DB_NAME}
      MLFLOW_DB_USER: ${MLFLOW_DB_USER}
      MLFLOW_DB_PASSWORD: ${MLFLOW_DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME:-fastapi}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER:-fastapi}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD:-fastapi}
      STREAMLIT_DB_USER: ${STREAMLIT_DB_USER:-streamlit}
      STREAMLIT_DB_PASSWORD: ${STREAMLIT_DB_PASSWORD:-streamlit}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./docker-init/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: always
    networks:
      - oriontrader_network

  postgres-init:
    image: postgres:15
    container_name: orion_postgres_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MLFLOW_DB_NAME: ${MLFLOW_DB_NAME}
      MLFLOW_DB_USER: ${MLFLOW_DB_USER}
      MLFLOW_DB_PASSWORD: ${MLFLOW_DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME:-fastapi}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER:-fastapi}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD:-fastapi}
      STREAMLIT_DB_USER: ${STREAMLIT_DB_USER:-streamlit}
      STREAMLIT_DB_PASSWORD: ${STREAMLIT_DB_PASSWORD:-streamlit}
    volumes:
      - ./docker-init/init-postgres.sh:/init-postgres.sh
    command: bash /init-postgres.sh
    networks:
      - oriontrader_network
    restart: "no"
    labels:
      - "com.docker.compose.oneoff=True"

  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: orion_mlflow
    working_dir: /mlflow
    environment:
      MLFLOW_HOST: "*"
    volumes:
      - mlflow-artifacts:/mlflow/mlruns
    command:
      - mlflow
      - server
      - --backend-store-uri
      - postgresql://${MLFLOW_DB_USER}:${MLFLOW_DB_PASSWORD}@postgres:5432/${MLFLOW_DB_NAME}
      - --default-artifact-root
      - file:///mlflow/mlruns
      - --host
      - 0.0.0.0
      - --port
      - "5001"
      - --allowed-hosts
      - "*"
    # Pas de port exposé à l'extérieur — nginx gère le SSL
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - oriontrader_network
    restart: always

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: orion_fastapi
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      ENVIRONMENT: production
      FASTAPI_DB_HOST: postgres
      FASTAPI_DB_PORT: 5432
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME:-fastapi}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER:-fastapi}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD:-fastapi}
      FASTAPI_MASTER_TOKEN: ${FASTAPI_MASTER_TOKEN}
      MLFLOW_TRACKING_URI: http://mlflow:5001
      PYTHONPATH: /opt/airflow
    volumes:
      - mlflow-artifacts:/mlflow/mlruns:rw
      - ./airflow:/opt/airflow:ro
    # Pas de port exposé à l'extérieur — nginx gère le SSL
    networks:
      - oriontrader_network
    restart: always

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: orion_streamlit
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-trading_data}
      POSTGRES_USER: ${STREAMLIT_DB_USER:-streamlit}
      POSTGRES_PASSWORD: ${STREAMLIT_DB_PASSWORD:-streamlit}
      FASTAPI_URL: http://fastapi:8000
      FASTAPI_API_TOKEN: ${FASTAPI_MASTER_TOKEN}
    # Pas de port exposé à l'extérieur — nginx gère le SSL
    networks:
      - oriontrader_network
    restart: always
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8502 --server.fileWatcherType=poll

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: orion_nginx
    depends_on:
      - mlflow
      - fastapi
      - streamlit
    ports:
      - "5000:5000"    # MLflow HTTPS
      - "8001:8001"    # FastAPI HTTPS
      - "8501:8501"    # Streamlit HTTPS
    networks:
      - oriontrader_network
    restart: always

networks:
  oriontrader_network:
    driver: bridge

volumes:
  postgres-db-volume:
  mlflow-artifacts:
